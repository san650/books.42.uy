<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Lev — Personal book tracker">
<title>Lev</title>
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<meta name="theme-color" content="#1E104E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
</head>
<body>

<!-- Toolbar -->
<nav class="bg-deep flex items-center gap-4 px-5 py-4 w-full">
  <a href="/" class="flex items-center gap-3 shrink-0" style="text-decoration:none">
    <img src="assets/logo.svg" alt="" class="w-6 h-6">
    <mark class="font-brand text-lg fw-700 uppercase tracking-wide color-white bg-deep">Lev</mark>
  </a>
  <search class="flex-1">
    <input id="search" type="search" placeholder="Search book..." class="w-full bg-white color-deep font-body text-sm py-2 px-3 search-input">
  </search>
</nav>
<div class="bg-orange accent-strip"></div>

<!-- Book List -->
<main class="bg-white max-w-app mx-auto flex-1 w-full">
  <output id="book-count" class="bg-surface-alt color-mid font-mono text-xs fw-700 tracking-wide uppercase block px-5 py-2"></output>
  <div id="book-list"></div>
</main>

<!-- Footer -->
<footer class="bg-purple flex items-center justify-between flex-wrap gap-2 px-5 py-3 max-w-app mx-auto w-full">
  <small class="font-mono text-xs fw-700 color-white-50 tracking-sm">&copy; <time datetime="2026">2026</time> Santiago Ferreira &mdash; MIT License</small>
  <a href="https://github.com/san650/books.42.uy" target="_blank" rel="noopener" class="font-mono text-xs fw-700 color-yellow tracking-sm footer-link">GitHub</a>
</footer>

<!-- Book Detail Dialog -->
<dialog id="book-detail" class="book-dialog">
  <header id="detail-header" class="bg-deep px-5 py-5 flex items-start justify-between">
    <div>
      <h2 id="detail-title" class="font-title text-xl color-white leading-tight"></h2>
      <p id="detail-subtitle" class="font-body text-sm color-white-65 italic mt-1" hidden></p>
      <p id="detail-original" class="font-body text-sm color-white-50 mt-1" hidden></p>
      <p id="detail-saga" class="detail-saga-badge font-mono text-xs fw-700 color-yellow bg-purple uppercase tracking-sm" hidden></p>
    </div>
    <button id="detail-close" class="bg-purple color-white font-mono text-sm fw-700 py-1 px-3 uppercase tracking-wide close-btn">CLOSE</button>
  </header>
  <div class="bg-orange accent-strip"></div>
  <div id="detail-body" class="detail-grid">
    <aside id="detail-cover-col" class="bg-purple flex items-start justify-center p-4 relative">
      <figure id="detail-cover-wrap"></figure>
      <button id="detail-prev" class="detail-nav detail-nav-prev font-mono fw-700" aria-label="Previous book">&lt;</button>
      <button id="detail-next" class="detail-nav detail-nav-next font-mono fw-700" aria-label="Next book">&gt;</button>
    </aside>
    <div id="detail-meta-col" class="flex flex-col">
      <p id="detail-author" class="bg-surface font-body fw-600 text-base color-orange px-4 py-3"></p>
      <div id="detail-meta-rows"></div>
    </div>
  </div>
  <section id="detail-score-section" class="detail-score-strip bg-surface-alt flex items-center">
    <data id="detail-score" class="bg-orange color-white font-mono text-3xl fw-700 text-center detail-score-number"></data>
    <p class="font-brand text-xs uppercase tracking-wider color-mid px-4 py-3">Personal Score</p>
  </section>
  <section id="detail-review-section" class="bg-deep p-5">
    <h3 class="font-mono text-xs fw-700 uppercase tracking-wide color-yellow mb-3">Review</h3>
    <blockquote id="detail-review" class="font-title text-lg leading-relaxed color-white"></blockquote>
  </section>
</dialog>

<!-- Templates -->
<template id="tpl-book-row">
  <article class="book-row">
    <div class="book-cover-col" data-slot="cover"></div>
    <div class="flex-1 flex flex-col justify-center px-4 py-3 min-w-0">
      <h3 class="row-title font-title text-lg leading-tight color-deep" data-slot="title">
        <time class="font-mono text-xs fw-700 color-mid" data-slot="year"></time>
      </h3>
      <p class="row-subtitle font-body text-xs color-mid italic" data-slot="subtitle" hidden></p>
      <p class="row-original font-body text-xs color-mid" data-slot="original" hidden></p>
      <p class="row-author font-body text-sm color-mid mt-1" data-slot="author"></p>
    </div>
    <div class="score-col-w shrink-0 flex items-center justify-center">
      <data class="book-score" data-slot="score"></data>
    </div>
  </article>
</template>

<template id="tpl-saga-header">
  <div class="saga-header bg-purple px-5 py-2 flex items-center gap-2">
    <span class="font-brand text-xs fw-700 color-yellow uppercase tracking-wide" data-slot="saga-name"></span>
    <span class="font-mono text-xs fw-700 color-white-50" data-slot="saga-count"></span>
  </div>
</template>

<template id="tpl-saga-end">
  <div class="saga-end"></div>
</template>

<template id="tpl-meta-row">
  <div class="meta-row">
    <span class="meta-label-w shrink-0 flex items-center font-mono text-xs fw-700 uppercase tracking-wide color-mid px-3 py-2" data-slot="label"></span>
    <span class="flex items-center color-deep px-3 py-2" data-slot="value"></span>
  </div>
</template>

<!-- Help Dialog -->
<dialog id="help" class="help-dialog">
  <header class="bg-deep px-5 py-4 flex items-center justify-between">
    <h2 class="font-brand text-base fw-700 uppercase tracking-wide color-white">Keyboard Shortcuts</h2>
    <button class="bg-purple color-white font-mono text-sm fw-700 py-1 px-3 uppercase tracking-wide close-btn help-close-btn">CLOSE</button>
  </header>
  <div class="bg-orange accent-strip"></div>
  <dl class="help-list bg-white p-5">
    <div class="flex items-center gap-3 py-2">
      <dt><kbd class="bg-surface font-mono text-xs fw-700 color-deep px-2 py-1">&darr;</kbd> <kbd class="bg-surface font-mono text-xs fw-700 color-deep px-2 py-1">&uarr;</kbd></dt>
      <dd class="font-body text-sm color-mid">Navigate book list / prev&middot;next in detail</dd>
    </div>
    <div class="flex items-center gap-3 py-2">
      <dt><kbd class="bg-surface font-mono text-xs fw-700 color-deep px-2 py-1">Enter</kbd></dt>
      <dd class="font-body text-sm color-mid">Open selected book</dd>
    </div>
    <div class="flex items-center gap-3 py-2">
      <dt><kbd class="bg-surface font-mono text-xs fw-700 color-deep px-2 py-1">Esc</kbd></dt>
      <dd class="font-body text-sm color-mid">Close dialog / blur search</dd>
    </div>
    <div class="flex items-center gap-3 py-2">
      <dt><kbd class="bg-surface font-mono text-xs fw-700 color-deep px-2 py-1">F</kbd></dt>
      <dd class="font-body text-sm color-mid">Focus search bar</dd>
    </div>
    <div class="flex items-center gap-3 py-2">
      <dt><kbd class="bg-surface font-mono text-xs fw-700 color-deep px-2 py-1">?</kbd></dt>
      <dd class="font-body text-sm color-mid">Show this help</dd>
    </div>
  </dl>
</dialog>

<style>

<script type="module">
  // Data source: local db.json controlled by the user.
  // DOM construction uses safe textContent and createElement where possible.
  // Template strings for structural HTML only — no user-facing input is rendered.

  // --- Data ---
  const response = await fetch('db.json');
  const allBooks = await response.json();

  // --- DOM refs ---
  const bookList = document.getElementById('book-list');
  const bookCount = document.getElementById('book-count');
  const searchInput = document.getElementById('search');
  const detailDialog = document.getElementById('book-detail');
  const helpDialog = document.getElementById('help');
  const detailTitle = document.getElementById('detail-title');
  const detailSubtitle = document.getElementById('detail-subtitle');
  const detailOriginal = document.getElementById('detail-original');
  const detailSaga = document.getElementById('detail-saga');
  const detailAuthor = document.getElementById('detail-author');
  const detailCoverWrap = document.getElementById('detail-cover-wrap');
  const detailMetaRows = document.getElementById('detail-meta-rows');
  const detailScore = document.getElementById('detail-score');
  const detailReviewSection = document.getElementById('detail-review-section');
  const detailReview = document.getElementById('detail-review');

  // --- State ---
  let displayedBooks = [];
  let selectedIndex = -1;

  // --- Fuzzy search (trigram) ---
  const trigrams = (str) => {
    const s = str.toLowerCase();
    if (s.length < 3) return new Set([s]);
    const set = new Set();
    for (let i = 0; i <= s.length - 3; i++) set.add(s.slice(i, i + 3));
    return set;
  };

  const trigramScore = (query, text) => {
    const qTri = trigrams(query);
    const tTri = trigrams(text);
    let matches = 0;
    for (const t of qTri) if (tTri.has(t)) matches++;
    return qTri.size === 0 ? 0 : matches / qTri.size;
  };

  const bookMatchesQuery = (book, query) => {
    const fields = [
      book.title,
      book.subtitle ?? '',
      book.original_title ?? '',
      book.saga?.name ?? '',
      ...(book.authors?.map(a => a.name) ?? [])
    ];
    return fields.some(f => trigramScore(query, f) >= 0.3);
  };

  // --- Sorting: saga groups + alphabetical ---
  // Books with a saga group together. Groups sort by saga name among standalone books.
  // Within a group, books sort by saga.order. Standalone books sort by title.
  const sortBooks = (books) => {
    // Separate saga books and standalone books
    const sagas = new Map(); // saga name -> [books]
    const standalone = [];

    for (const book of books) {
      if (book.saga?.name) {
        const key = book.saga.name;
        if (!sagas.has(key)) sagas.set(key, []);
        sagas.get(key).push(book);
      } else {
        standalone.push(book);
      }
    }

    // Sort standalone alphabetically
    standalone.sort((a, b) => a.title.localeCompare(b.title, 'es'));

    // Sort each saga group by order
    for (const group of sagas.values()) {
      group.sort((a, b) => (a.saga.order ?? 0) - (b.saga.order ?? 0));
    }

    // Merge: saga groups sort by their name among standalone titles
    // Build a unified list of { type: 'standalone', book } | { type: 'saga', name, books }
    const entries = [];
    for (const book of standalone) entries.push({ type: 'standalone', sortKey: book.title, book });
    for (const [name, books] of sagas) entries.push({ type: 'saga', sortKey: name, name, books });
    entries.sort((a, b) => a.sortKey.localeCompare(b.sortKey, 'es'));

    return entries;
  };

  // --- Templates ---
  const bookRowTpl = document.getElementById('tpl-book-row');
  const sagaHeaderTpl = document.getElementById('tpl-saga-header');
  const sagaEndTpl = document.getElementById('tpl-saga-end');
  const metaRowTpl = document.getElementById('tpl-meta-row');

  const slot = (root, name) => root.querySelector(`[data-slot="${name}"]`);

  // --- Cover helpers ---
  const gradientClass = (id) => `ph-${id % 5}`;

  const coverInitials = (book) => {
    const title = book.title ?? '';
    const letters = title.replace(/[^a-zA-Z\u00C0-\u024F]/g, '');
    return letters.slice(0, 2).toUpperCase();
  };

  const buildPlaceholder = (book, cls) => {
    const ph = document.createElement('div');
    ph.className = `${cls} cover-ph ${gradientClass(book.id)}`;
    const initials = coverInitials(book);
    if (initials) {
      const span = document.createElement('span');
      span.className = `cover-initials ${cls === 'cover-lg' ? 'cover-initials-lg' : ''}`;
      span.textContent = initials;
      ph.appendChild(span);
    }
    return ph;
  };

  const createCoverEl = (book, size = 'sm') => {
    const cls = size === 'sm' ? 'cover-sm' : 'cover-lg';
    const defaultCover = book.covers?.find(c => c.default);

    if (defaultCover) {
      const img = document.createElement('img');
      img.src = defaultCover.file;
      img.alt = '';
      img.className = `${cls} object-cover`;
      img.onerror = () => img.replaceWith(buildPlaceholder(book, cls));
      return img;
    }

    return buildPlaceholder(book, cls);
  };

  // --- Build a single book row from template ---
  const buildBookRow = (book, flatIndex) => {
    const frag = bookRowTpl.content.cloneNode(true);
    const article = frag.querySelector('article');
    article.dataset.index = flatIndex;

    slot(frag, 'cover').appendChild(createCoverEl(book));

    const titleEl = slot(frag, 'title');
    titleEl.prepend(book.title + ' ');
    const yearEl = slot(frag, 'year');
    if (book.first_publishing_date) {
      yearEl.textContent = book.first_publishing_date;
    } else {
      yearEl.remove();
    }

    // Subtitle
    const subtitleEl = slot(frag, 'subtitle');
    if (book.subtitle) {
      subtitleEl.textContent = book.subtitle;
      subtitleEl.hidden = false;
    } else {
      subtitleEl.remove();
    }

    // Original title
    const origEl = slot(frag, 'original');
    if (book.original_title && book.original_title !== book.title) {
      origEl.textContent = book.original_title;
      origEl.hidden = false;
    } else {
      origEl.remove();
    }

    // Author
    const authorEl = slot(frag, 'author');
    const authors = book.authors?.map(a => a.name).join(', ');
    if (authors) {
      authorEl.textContent = authors;
    } else {
      authorEl.remove();
    }

    // Score
    const scoreEl = slot(frag, 'score');
    const hasScore = book.score != null;
    scoreEl.textContent = hasScore ? book.score : '\u2013';
    if (hasScore) scoreEl.value = book.score;
    if (hasScore && book.score >= 9) scoreEl.classList.add('book-score-high');

    return frag;
  };

  // --- Render book list with saga grouping ---
  const renderBooks = (books) => {
    selectedIndex = -1;
    bookList.replaceChildren();

    const entries = sortBooks(books);

    // Build flat list for keyboard nav and dialog lookup
    const flat = [];
    for (const entry of entries) {
      if (entry.type === 'standalone') flat.push(entry.book);
      else for (const b of entry.books) flat.push(b);
    }
    displayedBooks = flat;

    if (flat.length === 0) {
      const p = document.createElement('p');
      p.className = 'font-body text-sm color-mid p-5';
      p.textContent = 'No books found.';
      bookList.appendChild(p);
    } else {
      let flatIndex = 0;
      for (const entry of entries) {
        if (entry.type === 'standalone') {
          bookList.appendChild(buildBookRow(entry.book, flatIndex));
          flatIndex++;
        } else {
          // Saga header
          const headerFrag = sagaHeaderTpl.content.cloneNode(true);
          slot(headerFrag, 'saga-name').textContent = entry.name;
          slot(headerFrag, 'saga-count').textContent = `${entry.books.length} ${entry.books.length === 1 ? 'book' : 'books'}`;
          bookList.appendChild(headerFrag);

          // Saga group wrapper
          const group = document.createElement('div');
          group.className = 'saga-group';
          for (const book of entry.books) {
            group.appendChild(buildBookRow(book, flatIndex));
            flatIndex++;
          }
          bookList.appendChild(group);

          // Saga end separator
          bookList.appendChild(sagaEndTpl.content.cloneNode(true));
        }
      }
    }

    bookCount.textContent = `${flat.length} ${flat.length === 1 ? 'book' : 'books'}`;
  };

  // --- Search ---
  searchInput.addEventListener('input', () => {
    const query = searchInput.value.trim();
    renderBooks(query ? allBooks.filter(b => bookMatchesQuery(b, query)) : allBooks);
  });

  // --- Dialog: populate and show ---
  const openBookDetail = (book) => {
    detailTitle.textContent = book.title;

    // Subtitle
    if (book.subtitle) {
      detailSubtitle.textContent = book.subtitle;
      detailSubtitle.hidden = false;
    } else {
      detailSubtitle.hidden = true;
    }

    // Original title
    if (book.original_title && book.original_title !== book.title) {
      detailOriginal.textContent = book.original_title;
      detailOriginal.hidden = false;
    } else {
      detailOriginal.hidden = true;
    }

    // Saga badge
    if (book.saga?.name) {
      detailSaga.textContent = `${book.saga.name} #${book.saga.order}`;
      detailSaga.hidden = false;
    } else {
      detailSaga.hidden = true;
    }

    detailAuthor.textContent = book.authors?.map(a => a.name).join(', ') ?? '';
    detailCoverWrap.replaceChildren(createCoverEl(book, 'lg'));

    // Meta rows using <template>
    detailMetaRows.replaceChildren();
    const rows = [];
    if (book.first_publishing_date) rows.push({ label: 'Year', value: book.first_publishing_date, mono: true });
    if (book.publisher) rows.push({ label: 'Publisher', value: book.publisher, mono: false });
    for (const id of (book.identifiers ?? [])) rows.push({ label: id.type, value: id.value, mono: true });
    if (book.publish_dates?.length > 1) rows.push({ label: 'Editions', value: book.publish_dates.join(', '), mono: false });
    if (book.saga?.name) rows.push({ label: 'Saga', value: `${book.saga.name} #${book.saga.order}`, mono: true });

    for (const r of rows) {
      const frag = metaRowTpl.content.cloneNode(true);
      slot(frag, 'label').textContent = r.label;
      const valueEl = slot(frag, 'value');
      valueEl.textContent = r.value;
      valueEl.classList.add(...(r.mono ? ['font-mono', 'text-xs', 'fw-700'] : ['font-body', 'text-sm']));
      detailMetaRows.appendChild(frag);
    }

    const hasScore = book.score != null;
    detailScore.textContent = hasScore ? book.score : '\u2013';
    if (hasScore) detailScore.value = book.score;

    if (book.review) {
      detailReview.textContent = book.review;
      detailReviewSection.classList.remove('hidden');
    } else {
      detailReviewSection.classList.add('hidden');
    }

    updateDetailNav();
    detailDialog.showModal();
  };

  // --- Dialog navigation ---
  const detailPrev = document.getElementById('detail-prev');
  const detailNext = document.getElementById('detail-next');

  const updateDetailNav = () => {
    detailPrev.disabled = selectedIndex <= 0;
    detailNext.disabled = selectedIndex >= displayedBooks.length - 1;
  };

  const navigateDetail = (delta) => {
    const next = selectedIndex + delta;
    if (next < 0 || next >= displayedBooks.length) return;
    selectedIndex = next;
    updateSelection();
    openBookDetail(displayedBooks[selectedIndex]);
  };

  detailPrev.addEventListener('click', () => navigateDetail(-1));
  detailNext.addEventListener('click', () => navigateDetail(1));

  // --- Dialog: close on backdrop click ---
  detailDialog.addEventListener('click', (e) => { if (e.target === detailDialog) detailDialog.close(); });
  helpDialog.addEventListener('click', (e) => { if (e.target === helpDialog) helpDialog.close(); });

  // Close buttons
  document.getElementById('detail-close').addEventListener('click', () => detailDialog.close());
  document.querySelector('.help-close-btn').addEventListener('click', () => helpDialog.close());

  // --- Book row click (event delegation) ---
  bookList.addEventListener('click', (e) => {
    const row = e.target.closest('.book-row');
    if (!row) return;
    const index = parseInt(row.dataset.index, 10);
    selectedIndex = index;
    updateSelection();
    openBookDetail(displayedBooks[index]);
  });

  // --- Selection visual ---
  const updateSelection = () => {
    const rows = bookList.querySelectorAll('.book-row');
    for (const [i, row] of rows.entries()) row.classList.toggle('selected', i === selectedIndex);
    rows[selectedIndex]?.scrollIntoView({ block: 'nearest' });
  };

  // --- Keyboard navigation ---
  document.addEventListener('keydown', (e) => {
    const inSearch = document.activeElement === searchInput;
    const detailOpen = detailDialog.open;
    const helpOpen = helpDialog.open;

    if (e.key === 'Escape') {
      if (detailOpen) {
        requestAnimationFrame(() => bookList.querySelectorAll('.book-row')[selectedIndex]?.focus({ preventScroll: true }));
        return;
      }
      if (helpOpen) return;
      if (inSearch) { e.preventDefault(); searchInput.blur(); return; }
      return;
    }

    if (inSearch) return;

    // Arrow keys navigate books inside the detail dialog
    if (detailOpen && (e.key === 'ArrowDown' || e.key === 'ArrowRight')) {
      e.preventDefault();
      navigateDetail(1);
      return;
    }
    if (detailOpen && (e.key === 'ArrowUp' || e.key === 'ArrowLeft')) {
      e.preventDefault();
      navigateDetail(-1);
      return;
    }

    if (detailOpen || helpOpen) return;

    const rows = bookList.querySelectorAll('.book-row');
    const maxIndex = rows.length - 1;

    switch (e.key) {
      case 'ArrowDown':
        e.preventDefault();
        selectedIndex = Math.min(selectedIndex + 1, maxIndex);
        updateSelection();
        break;
      case 'ArrowUp':
        e.preventDefault();
        selectedIndex = Math.max(selectedIndex - 1, 0);
        updateSelection();
        break;
      case 'Enter':
      case ' ':
        if (selectedIndex >= 0 && selectedIndex < displayedBooks.length) {
          e.preventDefault();
          openBookDetail(displayedBooks[selectedIndex]);
        }
        break;
      case 'f':
      case 'F':
        e.preventDefault();
        searchInput.focus();
        break;
      case '?':
        e.preventDefault();
        helpDialog.showModal();
        break;
    }
  });

  detailDialog.addEventListener('close', () => {
    bookList.querySelectorAll('.book-row')[selectedIndex]?.scrollIntoView({ block: 'nearest' });
  });

  // --- Init ---
  renderBooks(allBooks);

  // --- Service worker ---
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
